<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Vic | Electricidade Automotiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4D00;
            --secondary: #FFCC00;
            --dark: #0a0a0a;
            --dark-card: #161616;
            --white: #ffffff;
            --gradient: linear-gradient(90deg, #FF4D00, #FFCC00);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: var(--white); line-height: 1.6; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        header img { max-width: 180px; margin-bottom: 10px; }
        nav { display: flex; justify-content: center; gap: 20px; }
        nav a { color: var(--white); text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .hero { padding: 60px 20px; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .hero h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        section { padding: 40px 20px; max-width: 1100px; margin: auto; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .service-card { background: var(--dark-card); padding: 20px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .map-container { width: 100%; height: 300px; border-radius: 15px; overflow: hidden; margin-top: 20px; border: 1px solid #333; }
        footer { background: #000; padding: 30px; text-align: center; border-top: 1px solid #222; font-size: 14px; }
        .float-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-f { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-w { background: #25D366; }
        .btn-p { background: var(--primary); }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Auto Vic">
    <nav>
        <a href="#servicos">Serviços</a>
        <a href="#onde">Onde Estamos</a>
        <a href="#contactos">Contacto</a>
    </nav>
</header>

<div class="hero">
    <h1>Auto Vic</h1>
    <p>Tecnologia Automotiva de Precisão</p>
</div>

<section id="servicos">
    <h2 style="text-align: center; font-family: 'Oswald';">Nossos Serviços</h2>
    <div class="services-grid">
        <div class="service-card">⚡ Injeção Eletrônica</div>
        <div class="service-card">❄️ Ar Condicionado</div>
        <div class="service-card">🔋 Baterias</div>
        <div class="service-card">📍 GPS & Alarmes</div>
    </div>
</section>

<section id="onde">
    <h2 style="text-align: center; font-family: 'Oswald';">Localização</h2>
    <p style="text-align: center;">📍 Matola - Cinema 700</p>
    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14352.482813158434!2d32.4636!3d-25.9389!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1ee6903f00000001%3A0x0!2sCinema%20700!5e0!3m2!1spt-PT!2smz!4v1710000000000!5m2!1spt-PT!2smz" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
</section>

<footer id="contactos">
    <p>© Auto Vic Electricidade Automotiva</p>
    <p>📞 876032193 / 855032193</p>
</footer>

<div class="float-btns">
    <a href="tel:876032193" class="btn-f btn-p">📞</a>
    <a href="https://wa.me/258876032193" class="btn-f btn-w">💬</a>
</div>

</body>
</html>
